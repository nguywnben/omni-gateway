    <section id="loginSection" class="login-wrapper" aria-label="Login">
        <div class="login-card">
            <div class="login-brand">
                <span class="app-mark" aria-hidden="true">
                    <img class="app-mark-image" src="/frontend/assets/logo.png" alt="">
                </span>
                <div class="login-brand-title">Omni Gateway</div>
            </div>
            <h1 class="login-title">Sign In to the Console</h1>
            <p class="login-copy">Manage routing, credentials, fallback behavior, and protocol translation from one focused workspace.</p>
            <form id="loginForm" class="login-form" autocomplete="on">
                <input class="password-manager-identity" type="text" name="username" value="admin" autocomplete="username" tabindex="-1" aria-hidden="true">
                <label for="loginPassword">Console password</label>
                <input type="password" id="loginPassword" name="password" placeholder="Enter password" autocomplete="current-password">
                <button type="submit" class="btn">Continue</button>
            </form>
        </div>
        <footer class="login-footer" aria-label="Site footer">
            <span>Omni Gateway</span>
            <span>Universal AI routing for coding tools.</span>
        </footer>
    </section>
