    <section id="setupSection" class="login-wrapper" aria-label="Initial setup">
        <div class="login-card">
            <div class="login-brand">
                <span class="app-mark" aria-hidden="true">
                    <img class="app-mark-image" src="/frontend/assets/logo.png" alt="">
                </span>
                <div class="login-brand-title">Omni Gateway</div>
            </div>
            <h1 class="login-title">Create Your Console Password</h1>
            <p class="login-copy">Secure this new Omni Gateway instance before opening the management console.</p>
            <form id="setupForm" class="login-form" autocomplete="on">
                <input class="password-manager-identity" type="text" name="username" value="admin" autocomplete="username" tabindex="-1" aria-hidden="true">
                <label for="setupPassword">Console password</label>
                <input type="password" id="setupPassword" name="new-password" placeholder="At least 8 characters" autocomplete="new-password">
                <label for="setupPasswordConfirm">Confirm password</label>
                <input type="password" id="setupPasswordConfirm" name="confirm-password" placeholder="Re-enter password" autocomplete="new-password">
                <div id="setupTokenGroup" class="setup-token-group hidden">
                    <label for="setupToken">Setup token</label>
                    <input type="password" id="setupToken" name="setup-token" placeholder="Enter the token from the application logs" autocomplete="off" spellcheck="false">
                    <p class="field-hint">Remote setup requires the one-time token printed in the container or application logs.</p>
                </div>
                <button type="submit" class="btn">Create password</button>
            </form>
        </div>
        <footer class="login-footer" aria-label="Site footer">
            <span>Omni Gateway</span>
            <span>Universal AI routing for coding tools.</span>
        </footer>
    </section>
