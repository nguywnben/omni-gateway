services:
  app:
    image: ${IMAGE:-nguywnben/omni-gateway:latest}
    pull_policy: always
    container_name: omni-gateway
    restart: unless-stopped
    ports:
      - "${PORT:-4283}:${PORT:-4283}"
    environment:
      # Password configuration. Leave unset for the first-run web setup screen.
      # - PASSWORD=${PASSWORD}
      # - API_PASSWORD=${API_PASSWORD:-your_api_password}
      # - PANEL_PASSWORD=${PANEL_PASSWORD:-your_panel_password}

      # Server configuration
      - PORT=${PORT:-4283}
      - HOST=${HOST:-0.0.0.0}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - PANEL_SESSION_TTL_SECONDS=${PANEL_SESSION_TTL_SECONDS:-86400}
      - PANEL_LOGIN_WINDOW_SECONDS=${PANEL_LOGIN_WINDOW_SECONDS:-300}
      - PANEL_LOGIN_MAX_ATTEMPTS=${PANEL_LOGIN_MAX_ATTEMPTS:-10}

      # Logging configuration
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FILE=${LOG_FILE:-./backend/data/logs/omni-gateway.log}

      # Optional: Redis configuration (for distributed storage)
      # - REDIS_URL=${REDIS_URL}

      # Optional: MongoDB configuration (for distributed storage)
      # - MONGODB_URI=${MONGODB_URI}
      # - MONGODB_DATABASE=${MONGODB_DATABASE:-omni_gateway}

      # Optional: PostgreSQL configuration (for distributed storage)
      # - POSTGRESQL_URI=${POSTGRESQL_URI}

      # Optional: Proxy configuration
      # - PROXY=${PROXY}
    volumes:
      - ${DATA_DIR:-/opt/omni-gateway}/creds:/app/backend/data/creds
      - ${DATA_DIR:-/opt/omni-gateway}/logs:/app/backend/data/logs
