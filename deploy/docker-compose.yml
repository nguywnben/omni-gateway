services:
  app:
    image: ${IMAGE:-nguywnben/omni-gateway:latest}
    pull_policy: always
    container_name: omni-gateway
    restart: unless-stopped
    init: true
    read_only: true
    ports:
      - "${HOST_PORT:-4283}:${PORT:-4283}"
    environment:
      # Authentication. Empty values preserve automatic API-key generation and
      # the first-run web setup flow.
      - API_KEY=${API_KEY:-}
      - PANEL_PASSWORD=${PANEL_PASSWORD:-}
      - SETUP_TOKEN=${SETUP_TOKEN:-}

      # Server configuration
      - PORT=${PORT:-4283}
      - HOST=${HOST:-0.0.0.0}
      - WORKERS=${WORKERS:-1}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - PANEL_SESSION_TTL_SECONDS=${PANEL_SESSION_TTL_SECONDS:-86400}
      - PANEL_COOKIE_SECURE=${PANEL_COOKIE_SECURE:-}
      - PANEL_LOGIN_WINDOW_SECONDS=${PANEL_LOGIN_WINDOW_SECONDS:-300}
      - PANEL_LOGIN_MAX_ATTEMPTS=${PANEL_LOGIN_MAX_ATTEMPTS:-10}
      - PANEL_LOGIN_MAX_TRACKED_CLIENTS=${PANEL_LOGIN_MAX_TRACKED_CLIENTS:-10000}
      - MAX_REQUEST_BODY_MB=${MAX_REQUEST_BODY_MB:-64}
      - TRUST_PROXY_HEADERS=${TRUST_PROXY_HEADERS:-false}

      # Logging configuration
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FILE=${LOG_FILE:-./backend/data/logs/omni-gateway.log}
      - LOG_MAX_MB=${LOG_MAX_MB:-10}
      - LOG_BACKUP_COUNT=${LOG_BACKUP_COUNT:-3}

      # Optional: Redis-backed cache and session state
      - REDIS_URL=${REDIS_URL:-}

      # Optional: MongoDB storage backend
      - MONGODB_URI=${MONGODB_URI:-}
      - MONGODB_DATABASE=${MONGODB_DATABASE:-omni_gateway}

      # Optional: PostgreSQL storage backend
      - POSTGRESQL_URI=${POSTGRESQL_URI:-}

      # Optional: Proxy configuration
      - PROXY=${PROXY:-}
    volumes:
      - ${DATA_DIR:-/opt/omni-gateway}/creds:/app/backend/data/creds
      - ${DATA_DIR:-/opt/omni-gateway}/logs:/app/backend/data/logs
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import os, urllib.request; port = os.getenv('PORT', '4283');
          urllib.request.urlopen(f'http://127.0.0.1:{port}/ready', timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
