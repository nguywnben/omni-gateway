version: '3.8'

services:
  omni-gateway:
    image: nguywnben/omni-gateway:latest
    container_name: omni-gateway
    restart: unless-stopped
    network_mode: host
    environment:
      # Password configuration
      - OGW_PASSWORD=${OGW_PASSWORD:-pwd}
      # - OGW_API_PASSWORD=${OGW_API_PASSWORD:-your_api_password}
      # - OGW_PANEL_PASSWORD=${OGW_PANEL_PASSWORD:-your_panel_password}

      # Server configuration
      - OGW_PORT=${OGW_PORT:-7861}
      - OGW_HOST=${OGW_HOST:-0.0.0.0}

      # Optional: Logging configuration
      # - OGW_LOG_LEVEL=${OGW_LOG_LEVEL:-info}

      # Optional: Redis configuration (for distributed storage)
      # - OGW_REDIS_URL=${OGW_REDIS_URL}

      # Optional: MongoDB configuration (for distributed storage)
      # - OGW_MONGODB_URI=${OGW_MONGODB_URI}
      # - OGW_MONGODB_DATABASE=${OGW_MONGODB_DATABASE:-omni_gateway}

      # Optional: PostgreSQL configuration (for distributed storage)
      # - OGW_POSTGRESQL_URI=${OGW_POSTGRESQL_URI}

      # Optional: Proxy configuration
      # - OGW_PROXY=${OGW_PROXY}
    volumes:
      - ../backend/data/creds:/app/backend/data/creds

