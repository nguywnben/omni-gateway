services:
  - type: web
    name: omni-gateway
    runtime: docker
    dockerfilePath: ./deploy/Dockerfile
    dockerContext: .
    # Persistent credentials require a paid instance with an attached disk.
    plan: starter
    region: singapore
    healthCheckPath: /ready
    envVars:
      - key: PANEL_PASSWORD
        sync: false
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: "10000"
      - key: PANEL_COOKIE_SECURE
        value: "true"
      - key: TRUST_PROXY_HEADERS
        value: "true"
      - key: CREDENTIALS_DIR
        value: /app/backend/data/creds
      - key: LOG_FILE
        value: /app/backend/data/logs/omni-gateway.log
    disk:
      name: omni-gateway-data
      mountPath: /app/backend/data
      sizeGB: 1
