apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: omni-gateway
spec:
  description: >-
    A universal AI router for coding tools with smart auto-fallback,
    token-aware request cleanup, usage visibility, and seamless format translation.
  tags:
    - ai
    - api
    - ai-router
    - gemini
    - openai
  variables:
    - key: PANEL_PASSWORD
      type: STRING
      name: Console password
      description: Password used to access the Omni Gateway control panel.
    - key: DOMAIN
      type: DOMAIN
      name: Domain
      description: Public domain for the Omni Gateway service.
    - key: IMAGE
      type: STRING
      name: Container image
      description: Published container image to deploy.
  readme: |
    # Omni Gateway

    Omni Gateway routes coding-tool traffic across OpenAI-compatible, Gemini-compatible,
    Anthropic-compatible, and native backend formats.

    After deployment, open your assigned domain, sign in with the configured
    console password, and add credentials from the control panel.
  services:
    - name: omni-gateway
      template: PREBUILT
      spec:
        id: omni-gateway
        name: omni-gateway
        source:
          image: ${IMAGE}
        ports:
          - id: web
            port: 4283
            type: HTTP
        env:
          PANEL_PASSWORD:
            default: ${PANEL_PASSWORD}
          PORT:
            default: "4283"
          HOST:
            default: "0.0.0.0"
          PANEL_COOKIE_SECURE:
            default: "true"
          TRUST_PROXY_HEADERS:
            default: "true"
          DOMAIN:
            default: ${DOMAIN}
        volumes:
          - id: data
            dir: /app/backend/data
