name: Feature request
description: Propose a focused improvement to Omni Gateway.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions for this request.
          required: true
        - label: This request describes a user problem, not only an implementation preference.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Who is affected, what are they trying to do, and what prevents them today?
    validations:
      required: true

  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the observable behavior that would solve the problem.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Include workarounds or simpler approaches you evaluated.

  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility considerations
      description: Note affected SDKs, providers, routes, configuration, storage, or deployments.
