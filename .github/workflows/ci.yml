name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.14"]
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      ENABLE_LOG: "0"
      CREDENTIALS_DIR: /tmp/omni-gateway-tests/credentials
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements.lock
            requirements-dev.txt

      - name: Install locked runtime dependencies
        run: python -m pip install --require-hashes -r requirements.lock

      - name: Install development dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Verify runtime dependency lock
        if: matrix.python-version == '3.12'
        run: |
          pip-compile \
            --generate-hashes \
            --resolver=backtracking \
            --strip-extras \
            --no-header \
            --quiet \
            --output-file=requirements.lock \
            requirements.txt
          git diff --exit-code requirements.lock

      - name: Verify dependency compatibility
        run: python -m pip check

      - name: Audit Python dependencies
        if: matrix.python-version == '3.12'
        run: python -m pip_audit --local --progress-spinner off

      - name: Lint backend modules
        if: matrix.python-version == '3.12'
        run: ruff check backend

      - name: Check backend formatting
        if: matrix.python-version == '3.12'
        run: ruff format --check backend

      - name: Lint repository YAML
        if: matrix.python-version == '3.12'
        run: yamllint --strict .github deploy .yamllint.yml

      - name: Compile backend modules
        run: python -m compileall -q backend

      - name: Validate frontend JavaScript
        if: matrix.python-version == '3.12'
        run: |
          find frontend/js -type f -name '*.js' -print0 \
            | sort -z \
            | xargs -0 -n 1 node --check

      - name: Validate shell scripts
        if: matrix.python-version == '3.12'
        run: bash -n deploy/scripts/*.sh

      - name: Run unit tests
        run: python -m backend.tests

      - name: Verify route contracts
        if: matrix.python-version == '3.12'
        run: |
          python - <<'PY'
          import sys

          sys.path.insert(0, "backend")
          import main

          paths = set(main.app.openapi()["paths"])
          required = {
              "/v1/chat/completions",
              "/v1/responses",
              "/v1/messages",
              "/v1/models",
              "/v1beta/models",
              "/health",
              "/ready",
              "/api/auth/login",
              "/api/auth/keys",
              "/api/credentials/status",
              "/api/model-catalog",
              "/api/model-pools/omway",
          }
          missing = sorted(required - paths)
          forbidden_prefixes = tuple(
              "/" + name
              for name in ("og" + "w", "om" + "ni", "gate" + "way", "primary")
          )
          forbidden = [path for path in paths if path.startswith(forbidden_prefixes)]

          if missing:
              raise SystemExit(f"Missing route(s): {missing}")
          if forbidden:
              raise SystemExit(f"Forbidden branded route(s): {forbidden}")
          ui_paths = {"/", "/dashboard", "/models", "/pool", "/providers"}
          exposed_ui_paths = sorted(ui_paths & paths)
          if exposed_ui_paths:
              raise SystemExit(f"UI route(s) leaked into OpenAPI: {exposed_ui_paths}")
          print("Route contract verified.")
          PY

      - name: Smoke test the application
        if: matrix.python-version == '3.12'
        env:
          CREDENTIALS_DIR: /tmp/omni-gateway-ci/creds
          LOG_FILE: /tmp/omni-gateway-ci/logs/runtime.log
        run: |
          python backend/main.py > /tmp/omni-gateway-ci.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:4283/health >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              cat /tmp/omni-gateway-ci.log
              exit 1
            fi
            sleep 1
          done
          python backend/tests/runtime_smoke.py --expect-fresh-setup
          curl --fail --silent http://127.0.0.1:4283/frontend/assets/providers/google-antigravity-logo.png >/dev/null
          curl --fail --silent http://127.0.0.1:4283/frontend/assets/providers/google-ai-studio-logo.png >/dev/null
          curl --fail --silent http://127.0.0.1:4283/frontend/assets/providers/xai-grok-logo.png >/dev/null
          curl --fail --silent http://127.0.0.1:4283/frontend/assets/providers/spacexai-console-logo.png >/dev/null

      - name: Check whitespace
        if: matrix.python-version == '3.12'
        run: git diff --check

      - name: Check tracked generated Python artifacts
        if: matrix.python-version == '3.12'
        run: |
          if git ls-files | grep -E '(^|/)__pycache__/|\.pyc$' >/dev/null; then
            echo "Tracked Python cache artifacts found."
            exit 1
          fi

  container-smoke:
    name: Container smoke test
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Install smoke-test client
        run: python -m pip install "httpx==0.28.1"

      - name: Build container image
        run: docker build --tag omni-gateway:ci --file deploy/Dockerfile .

      - name: Start container
        run: |
          docker run --detach \
            --name omni-gateway-ci \
            --publish 4283:4283 \
            --env ENABLE_LOG=0 \
            --env SETUP_TOKEN=container-smoke-token \
            omni-gateway:ci

      - name: Verify container runtime
        run: |
          trap 'docker logs omni-gateway-ci' ERR
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:4283/ready >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              docker logs omni-gateway-ci
              exit 1
            fi
            sleep 1
          done
          python backend/tests/runtime_smoke.py \
            --expect-fresh-setup \
            --setup-token container-smoke-token
          curl --fail --silent http://127.0.0.1:4283/frontend/assets/providers/google-antigravity-logo.png >/dev/null
          curl --fail --silent http://127.0.0.1:4283/frontend/assets/providers/google-ai-studio-logo.png >/dev/null
          curl --fail --silent http://127.0.0.1:4283/frontend/assets/providers/xai-grok-logo.png >/dev/null
          curl --fail --silent http://127.0.0.1:4283/frontend/assets/providers/spacexai-console-logo.png >/dev/null

      - name: Stop container
        if: always()
        run: docker rm --force omni-gateway-ci || true

  publish-container:
    name: Publish verified container
    needs:
      - verify
      - container-smoke
    if: ${{ github.event_name != 'pull_request' }}
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-publish.yml
    secrets: inherit

  publish-release:
    name: Publish GitHub release
    needs:
      - verify
      - container-smoke
      - publish-container
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - name: Prepare release notes
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import sys
          from pathlib import Path

          version = os.environ["RELEASE_TAG"].removeprefix("v")
          sys.path.insert(0, "backend")
          from app_version import DEFAULT_APPLICATION_VERSION

          if version != DEFAULT_APPLICATION_VERSION:
              raise SystemExit(
                  "Release tag version "
                  f"{version} does not match DEFAULT_APPLICATION_VERSION "
                  f"{DEFAULT_APPLICATION_VERSION}."
              )

          lines = Path("CHANGELOG.md").read_text(encoding="utf-8").splitlines()
          heading = f"## [{version}]"

          try:
              start = next(index for index, line in enumerate(lines) if line.startswith(heading))
          except StopIteration as exc:
              raise SystemExit(f"CHANGELOG.md has no section for {version}.") from exc

          end = next(
              (index for index in range(start + 1, len(lines)) if lines[index].startswith("## [")),
              len(lines),
          )
          notes = "\n".join(lines[start + 1 : end]).strip()
          if not notes:
              raise SystemExit(f"CHANGELOG.md has no release notes for {version}.")

          output = Path(os.environ["RUNNER_TEMP"]) / "release-notes.md"
          output.write_text(notes + "\n", encoding="utf-8")
          print(f"Prepared release notes for {version}.")
          PY

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists."
            exit 0
          fi

          release_args=(
            "$RELEASE_TAG"
            --repo "$GITHUB_REPOSITORY"
            --title "Omni Gateway ${RELEASE_TAG#v}"
            --notes-file "$RUNNER_TEMP/release-notes.md"
            --verify-tag
          )

          if [[ "$RELEASE_TAG" == *-* ]]; then
            release_args+=(--prerelease)
          fi

          gh release create "${release_args[@]}"
