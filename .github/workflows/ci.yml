name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      ENABLE_LOG: "0"
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt

      - name: Verify dependency compatibility
        run: python -m pip check

      - name: Parse backend modules
        run: |
          python - <<'PY'
          import ast
          from pathlib import Path

          files = list(Path("backend").rglob("*.py"))
          for file in files:
              ast.parse(file.read_text(encoding="utf-8"), filename=str(file))
          print(f"Parsed {len(files)} backend Python files.")
          PY

      - name: Validate frontend JavaScript
        run: node --check frontend/common.js

      - name: Run unit tests
        run: python -m unittest discover -s backend/tests -p 'test_*.py'

      - name: Verify route contracts
        run: |
          python - <<'PY'
          import sys

          sys.path.insert(0, "backend")
          import main

          paths = set(main.app.openapi()["paths"])
          required = {
              "/v1/chat/completions",
              "/v1/responses",
              "/v1/messages",
              "/v1/models",
              "/v1beta/models",
              "/health",
              "/ready",
              "/api/auth/login",
              "/api/auth/keys",
              "/provider",
          }
          missing = sorted(required - paths)
          forbidden_prefixes = tuple(
              "/" + name
              for name in ("og" + "w", "om" + "ni", "gate" + "way", "primary")
          )
          forbidden = [path for path in paths if path.startswith(forbidden_prefixes)]

          if missing:
              raise SystemExit(f"Missing route(s): {missing}")
          if forbidden:
              raise SystemExit(f"Forbidden branded route(s): {forbidden}")
          print("Route contract verified.")
          PY

      - name: Smoke test the application
        env:
          CREDENTIALS_DIR: /tmp/omni-gateway-ci/creds
          LOG_FILE: /tmp/omni-gateway-ci/logs/runtime.log
        run: |
          python backend/main.py > /tmp/omni-gateway-ci.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:4283/health >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              cat /tmp/omni-gateway-ci.log
              exit 1
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:4283/ready

      - name: Check whitespace
        run: git diff --check

      - name: Check generated Python artifacts
        run: |
          if find backend frontend deploy -name '__pycache__' -o -name '*.pyc' | grep -q .; then
            echo "Generated Python cache artifacts found."
            exit 1
          fi
